<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <style>
    .bg { fill: #ff0000; opacity: 1; }
    .fg { fill: #00ff00; stroke: none; }
    .border { stroke: #0000ff; stroke-width: 2; fill: none; }
  </style>
  <rect class="bg" width="100" height="100"/>
  <circle class="fg" cx="50" cy="50" r="30"/>
  <rect class="border" x="10" y="10" width="80" height="80"/>
</svg>
