<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #000000; }
    }
    .bg { fill: #ffffff; }
    .fg { fill: #333333; }
  </style>
  <rect class="bg" width="100" height="100"/>
  <circle class="fg" cx="50" cy="50" r="30"/>
</svg>
